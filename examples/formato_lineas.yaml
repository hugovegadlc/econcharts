# Form overrides + missing values. `line: dashed` switches the stroke, `color: <name>`
# pins a series to a theme palette color by name. The forecast has leading nulls, so
# it begins at its first real point (no bridging across the empty quarters).
title: Observado y proyección
subtitle: observado vs. proyección (línea discontinua)
theme: bbva
period: 2021Q1:2024Q4
series:
  - name: Observado
    type: line
    data: [2.1, 2.4, 3.0, 3.8, 4.5, 5.1, 5.4, 5.0, 4.3, 3.6, 3.1, null, null, null, null, null]
  - name: Proyección
    type: line
    line: dashed
    color: orange
    data: [null, null, null, null, null, null, null, null, null, null, 3.1, 3.0, 3.1, 3.3, 3.4, 3.4]
